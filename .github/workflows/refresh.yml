name: 更新行情數據

on:
  workflow_dispatch:        # 手機/網頁一鍵手動更新
  schedule:                 # 盤中自動更新（UTC）
    - cron: '*/10 1-5 * * 1-5'   # 台股盤中 09:00–13:50（台北）每 10 分
    - cron: '31 6 * * 1-5'       # 台股收盤後完整快照 14:31（台北）
    - cron: '*/15 13-20 * * 1-5' # 美股盤中（台北 21:30–04:00）每 15 分
    - cron: '35 21 * * 1-5'      # 美股收盤後快照 05:35（台北）

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet --upgrade 'yfinance>=0.2.60' requests curl_cffi
      - run: python scripts/refresh_data.py
      - run: |
          git config user.name "market-refresh-bot"
          git config user.email "lin7125@gmail.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "盤中行情更新 $(TZ=Asia/Taipei date +'%F %H:%M')"
          git push
